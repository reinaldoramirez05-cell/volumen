<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volumen - Interactive</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 14px;
            transition: opacity 1s ease;
            pointer-events: none;
        }

        #canvas3d {
            width: 100vw;
            height: 100vh;
            display: block;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .play-btn {
            position: absolute;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(191, 45, 31, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            text-decoration: none;
        }

        .play-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
            transition: fill 0.3s;
            margin-left: 4px;
        }

        .play-btn:hover {
            background: rgba(191, 45, 31, 0.9);
            border-color: #fff;
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 0 30px rgba(191, 45, 31, 0.4);
        }

        .play-btn::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid #bf2d1f;
            opacity: 0;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        body.loaded #canvas3d { opacity: 1; }
        body.loaded .play-btn { opacity: 1; pointer-events: auto; }
        body.loaded #loader { opacity: 0; }
    </style>
</head>
<body>
    <div id="loader">Loading Environment...</div>
    <canvas id="canvas3d"></canvas>
    
    <a href="index.html" class="play-btn">
        <svg viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </a>

    <script type="module">
        import { Application } from 'https://esm.sh/@splinetool/runtime';

        const canvas = document.getElementById('canvas3d');
        const spline = new Application(canvas);

        spline.load('https://prod.spline.design/g0MvNt8Ko9rrWfZe/scene.splinecode')
            .then(() => {
                document.body.classList.add('loaded');
                
                spline.addEventListener('mouseDown', () => {
                    window.location.href = 'index.html';
                });

                canvas.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
            })
            .catch((e) => {
                document.getElementById('loader').innerText = "Load Failed";
            });
    </script>
</body>
</html>
