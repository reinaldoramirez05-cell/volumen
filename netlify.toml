[build]
  publish = "."

[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Clean URLs Redirects
[[redirects]]
  from = "/home"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/editorial"
  to = "/editorial.html"
  status = 200

[[redirects]]
  from = "/interviews"
  to = "/interviews.html"
  status = 200

[[redirects]]
  from = "/events"
  to = "/events.html"
  status = 200

# 404 fallback — branded error page instead of Spline loading screen
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
